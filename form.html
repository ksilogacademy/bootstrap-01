<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-4">
        <form action="" class="form">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Formulaire d'accueil</h4>
                </div>
                <div class="card-body">
                    <label for="nom">Nom complet</label>
                    <input type="text" class="form-control" id="nom">
                    <div class="row">
                        <div class="col-4">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                        <div class="col-4">
                            <label for="password">Mot de passe</label>
                            <input type="password" class="form-control" id="password">
                        </div>
                        <div class="col-4">
                            <label for="quartier">Quartier</label>
                            <input type="text" class="form-control" id="quartier">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <select name="" id="" class="form-control mt-2">
                                <option value="">votre pays</option>
                                <option value="">senegal</option>
                                <option value="">France</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <select name="" id="" class="form-control mt-2">
                                <option value="">votre Ville</option>
                                <option value="">Dakar</option>
                                <option value="">Paris</option>
                            </select>
                        </div>
                    </div>
                    <textarea name="" id="" class="form-control my-3" rows="2"></textarea>
                    <div class="input-group mb-3">
                        <span class="input-group-text" id="basic-addon1">@</span>
                        <input type="text" class="form-control" placeholder="Username" aria-label="Username"
                            aria-describedby="basic-addon1">
                            <span class="input-group-text" id="basic-addon1">AT</span>
                    </div>
                    <button class="btn btn-outline-success w-100 my-3">Soumettre</button>
                </div>
            </div>

        </form>

    </div>
</body>

</html>
